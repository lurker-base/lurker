name: LURKER Lifecycle Manager

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lifecycle Manager
        run: python3 scripts/lifecycle_manager.py

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals/lifecycle_feed.json state/volume_alerts.json data/signals/*.json || true
          git diff --cached --quiet || git commit -m "chore: lifecycle update [$(date +%H:%M)]"
          git push || echo "Nothing to push"
