name: LURKER Risk Alerts — Telegram Notifications

on:
  schedule:
    - cron: '*/5 * * * *'  # Check every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  risk-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check for high-risk tokens
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          LURKER_ALERTS_CHAT_ID: ${{ secrets.LURKER_ALERTS_CHAT_ID }}
        run: |
          python3 -c "
import json
import sys
sys.path.insert(0, 'scripts')
from risk_alerts import check_and_alert

# Load current feed
try:
    with open('signals/cio_feed.json') as f:
        data = json.load(f)
except FileNotFoundError:
    print('No feed file found')
    sys.exit(0)

# Check each candidate
count = 0
for c in data.get('candidates', []):
    if c.get('risk_level') == 'high':
        check_and_alert(c)
        count += 1

if count == 0:
    print('No high-risk tokens detected')
"
      - name: Commit logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/risk_alerts.json || true
          git diff --cached --quiet || git commit -m "chore: risk alerts log [$(date +%H:%M)]"
          git push || echo "Nothing to push"
