name: LURKER Top Performers

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Top Performers
        run: python3 scripts/top_performers.py

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals/top_performers.json || true
          git diff --cached --quiet || git commit -m "data: Top performers update [skip ci]"
          git push || echo "Nothing to push"
