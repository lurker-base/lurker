name: LURKER Hourly Voice

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tweepy

      - name: Post Hourly Tweet
        env:
          API_KEY: ${{ secrets.TWITTER_API_KEY_LURKER }}
          API_SECRET: ${{ secrets.TWITTER_API_SECRET_LURKER }}
          ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN_LURKER }}
          ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET_LURKER }}
        run: python scripts/hourly_voice.py
