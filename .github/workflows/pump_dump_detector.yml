name: Pump/Dump Detector

on:
  schedule:
    - cron: '*/15 * * * *'  # Toutes les 15 minutes
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tweepy requests

      - name: Run Pump/Dump Detector
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY_LURKER }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET_LURKER }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN_LURKER }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET_LURKER }}
        run: python scripts/pump_dump_detector.py

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/sent_alerts.json state/risk_warnings.json || true
          git diff --cached --quiet || git commit -m "chore: pump/dump alerts update [$(date +%H:%M)]"
          git push || echo "Nothing to push"
