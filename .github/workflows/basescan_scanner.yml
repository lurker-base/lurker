name: LURKER BaseScan Scanner

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Run Hybrid Scanner (RPC + DexScreener)
        run: python3 scripts/scanner_hybrid.py

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals/basescan_feed.json state/basescan_seen.json || true
          git diff --cached --quiet || git commit -m "chore: basescan fresh tokens [$(date +%H:%M)]"
          git push || echo "Nothing to push"
