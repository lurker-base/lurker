name: LURKER Workflow Monitor

on:
  schedule:
    - cron: '*/10 * * * *'  # Check every 10 minutes
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check if CIO scanner is running
        uses: actions/github-script@v7
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'scanner_cio_v3.yml',
              per_page: 1
            });
            
            if (runs.workflow_runs.length === 0) {
              console.log('❌ No recent runs found!');
              core.setFailed('CIO scanner not running');
              return;
            }
            
            const lastRun = runs.workflow_runs[0];
            const lastRunTime = new Date(lastRun.created_at);
            const now = new Date();
            const diffMinutes = (now - lastRunTime) / 1000 / 60;
            
            if (diffMinutes > 15) {
              console.log(`❌ Last run was ${diffMinutes.toFixed(0)} minutes ago`);
              core.setFailed('CIO scanner stalled');
            } else {
              console.log(`✅ Last run was ${diffMinutes.toFixed(0)} minutes ago`);
            }

      - name: Alert if stalled
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.LURKER_ALERTS_CHAT_ID }}" \
            -d "text=🚨 LURKER ALERT: CIO Scanner workflow stalled! Check GitHub Actions immediately." \
            -d "parse_mode=HTML" || true
