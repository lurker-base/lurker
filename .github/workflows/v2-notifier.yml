name: V2 Notifier

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v2-refonte

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tweepy requests

      - name: Run Notifier
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY_LURKER }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET_LURKER }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN_LURKER }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET_LURKER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python v2/scripts/notifier.py

      - name: Commit alerts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/alerts.json || true
          git diff --cached --quiet || git commit -m "v2: alerts update [$(date +%H:%M)]"
          git push || echo "Nothing to push"
