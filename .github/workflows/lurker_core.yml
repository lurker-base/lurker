name: LURKER Core

on:
  schedule:
    - cron: '*/2 * * * *'  # Every 2 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lurker-core
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests tweepy

      - name: Ensure directories exist
        run: mkdir -p state

      - name: Run Scanner
        run: python scripts/scanner_core.py

      - name: Run Lifecycle
        run: python scripts/lifecycle_core.py

      - name: Detect Copycats
        run: python scripts/detect_copycats.py

      - name: Run Notifier
        env:
          API_KEY: ${{ secrets.TWITTER_API_KEY_LURKER }}
          API_SECRET: ${{ secrets.TWITTER_API_SECRET_LURKER }}
          ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN_LURKER }}
          ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET_LURKER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/notifier_core.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/lurker_state.json state/sent_alerts.json || true
          git diff --cached --quiet || git commit -m "lurker: core update [$(date +%H:%M)]"
          git push || echo "Nothing to push"
