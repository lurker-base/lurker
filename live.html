<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LURKER — Live Signals</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            line-height: 1.6;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 1rem; }
        header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 1px solid #333;
            margin-bottom: 2rem;
        }
        h1 {
            color: #ff6b35;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .subtitle { color: #666; font-size: 0.9rem; }
        
        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 1rem;
            text-align: center;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff6b35;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
        }
        
        /* Filters */
        .filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
        }
        .filter-btn.active {
            background: #ff6b35;
            color: #000;
            border-color: #ff6b35;
        }
        .filter-btn:hover:not(.active) {
            border-color: #ff6b35;
            color: #ff6b35;
        }
        
        /* Token Grid */
        .tokens-grid {
            display: grid;
            gap: 1rem;
        }
        .token-card {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 1rem;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr;
            gap: 1rem;
            align-items: center;
        }
        .token-card:hover {
            border-color: #ff6b35;
        }
        .token-symbol {
            font-weight: bold;
            font-size: 1.1rem;
            color: #fff;
        }
        .token-name {
            font-size: 0.75rem;
            color: #666;
        }
        .token-category {
            padding: 0.25rem 0.5rem;
            border-radius: 3px;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
            text-align: center;
        }
        .cat-CIO { background: #2d5016; color: #4ade80; }
        .cat-WATCH { background: #1e3a8a; color: #60a5fa; }
        .cat-HOTLIST { background: #7c2d12; color: #fb923c; }
        .cat-CERTIFIED { background: #14532d; color: #86efac; }
        .cat-RUGGED { background: #000; color: #666; text-decoration: line-through; }
        .cat-FAST { background: #581c87; color: #c084fc; }
        .token-metric {
            text-align: right;
            font-size: 0.85rem;
        }
        .metric-label {
            font-size: 0.65rem;
            color: #666;
            text-transform: uppercase;
        }
        .metric-value {
            color: #fff;
        }
        .positive { color: #4ade80; }
        .negative { color: #f87171; }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
        .error {
            background: #7f1d1d;
            color: #fca5a5;
            padding: 1rem;
            margin: 1rem 0;
            text-align: center;
        }
        
        /* Last update */
        .last-update {
            text-align: center;
            color: #666;
            font-size: 0.8rem;
            margin-top: 2rem;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .token-card {
                grid-template-columns: 1fr 1fr;
                gap: 0.5rem;
            }
            .token-card > div:nth-child(3),
            .token-card > div:nth-child(4),
            .token-card > div:nth-child(5) {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👁 LURKER</h1>
            <p class="subtitle">Autonomous Token Surveillance on Base</p>
        </header>
        
        <div class="stats" id="stats">
            <div class="stat">
                <div class="stat-value" id="stat-total">-</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-cio">-</div>
                <div class="stat-label">CIO</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-watch">-</div>
                <div class="stat-label">Watch</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-hotlist">-</div>
                <div class="stat-label">Hotlist</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-certified">-</div>
                <div class="stat-label">Certified</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-rugged">-</div>
                <div class="stat-label">Rugged</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-pumps">-</div>
                <div class="stat-label">Pumps</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-dumps">-</div>
                <div class="stat-label">Dumps</div>
            </div>
        </div>
        
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="CIO">CIO</button>
            <button class="filter-btn" data-filter="WATCH">Watch</button>
            <button class="filter-btn" data-filter="HOTLIST">Hotlist</button>
            <button class="filter-btn" data-filter="FAST">Fast</button>
            <button class="filter-btn" data-filter="CERTIFIED">Certified</button>
            <button class="filter-btn" data-filter="RUGGED">Rugged</button>
        </div>
        
        <div id="tokens-container">
            <div class="loading">Loading signals...</div>
        </div>
        
        <p class="last-update">Last update: <span id="last-update">-</span></p>
    </div>

    <script>
        const STATE_URL = 'https://raw.githubusercontent.com/lurker-base/lurker/main/state/lurker_state.json';
        let allTokens = [];
        let currentFilter = 'all';
        
        async function loadState() {
            try {
                const response = await fetch(STATE_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('Failed to load');
                const state = await response.json();
                
                allTokens = Object.values(state.tokens || {});
                updateStats(state.meta?.stats || {});
                renderTokens();
                document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
            } catch (error) {
                document.getElementById('tokens-container').innerHTML = 
                    `<div class="error">Error loading data: ${error.message}</div>`;
            }
        }
        
        function updateStats(stats) {
            const byCat = stats.by_category || {};
            document.getElementById('stat-total').textContent = 
                Object.values(byCat).reduce((a, b) => a + b, 0);
            document.getElementById('stat-cio').textContent = byCat.CIO || 0;
            document.getElementById('stat-watch').textContent = byCat.WATCH || 0;
            document.getElementById('stat-hotlist').textContent = byCat.HOTLIST || 0;
            document.getElementById('stat-certified').textContent = byCat.CERTIFIED || 0;
            document.getElementById('stat-rugged').textContent = byCat.RUGGED || 0;
            document.getElementById('stat-pumps').textContent = stats.pumps_24h || 0;
            document.getElementById('stat-dumps').textContent = stats.dumps_24h || 0;
        }
        
        function formatNumber(num) {
            if (!num) return '-';
            if (num >= 1000000) return '$' + (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return '$' + (num / 1000).toFixed(1) + 'K';
            return '$' + num.toFixed(0);
        }
        
        function formatAge(detectedAt) {
            if (!detectedAt) return '-';
            const age = (Date.now() - new Date(detectedAt)) / 1000 / 60;
            if (age < 60) return Math.floor(age) + 'm';
            return Math.floor(age / 60) + 'h';
        }
        
        function renderTokens() {
            const container = document.getElementById('tokens-container');
            
            let tokens = allTokens;
            if (currentFilter !== 'all') {
                tokens = tokens.filter(t => t.category === currentFilter);
            }
            
            // Sort by detected_at desc
            tokens.sort((a, b) => new Date(b.detected_at) - new Date(a.detected_at));
            
            if (tokens.length === 0) {
                container.innerHTML = '<div class="loading">No tokens in this category</div>';
                return;
            }
            
            container.innerHTML = tokens.map(token => {
                const perf = token.performance || {};
                const metrics = token.metrics || {};
                const gain = perf.current_gain || 0;
                const gainClass = gain > 0 ? 'positive' : gain < 0 ? 'negative' : '';
                
                return `
                    <div class="token-card">
                        <div>
                            <div class="token-symbol">$${token.symbol || '?'}</div>
                            <div class="token-name">${token.name || 'Unknown'}</div>
                        </div>
                        <div class="token-category cat-${token.category || 'CIO'}">${token.category || 'CIO'}</div>
                        <div class="token-metric">
                            <div class="metric-label">Price</div>
                            <div class="metric-value">${metrics.price_usd ? '$' + metrics.price_usd.toFixed(6) : '-'}</div>
                        </div>
                        <div class="token-metric">
                            <div class="metric-label">Gain</div>
                            <div class="metric-value ${gainClass}">${gain > 0 ? '+' : ''}${gain.toFixed(1)}%</div>
                        </div>
                        <div class="token-metric">
                            <div class="metric-label">Liquidity</div>
                            <div class="metric-value">${formatNumber(metrics.liq_usd)}</div>
                        </div>
                        <div class="token-metric">
                            <div class="metric-label">Age</div>
                            <div class="metric-value">${formatAge(token.detected_at)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderTokens();
            });
        });
        
        // Load and refresh
        loadState();
        setInterval(loadState, 30000); // Refresh every 30s
    </script>
</body>
</html>
