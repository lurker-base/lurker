<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lifecycle — lurker</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <style>
        .lifecycle-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .lifecycle-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .lifecycle-header p {
            color: var(--text-muted);
        }
        
        .category-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .category-tab {
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .category-tab:hover,
        .category-tab.active {
            background: var(--accent);
            border-color: var(--accent);
        }
        
        .category-tab .count {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-left: 0.5rem;
        }
        
        .token-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }
        
        .token-card:hover {
            border-color: var(--accent);
        }
        
        .token-card.alert-spike {
            border-left: 4px solid #00ff00;
        }
        
        .token-card.alert-dump {
            border-left: 4px solid #ff4444;
        }
        
        .token-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .token-symbol {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .token-badges {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
        }
        
        .badge.new { background: rgba(0,255,0,0.2); color: #00ff00; }
        .badge.hot { background: rgba(255,165,0,0.2); color: #ffa500; }
        .badge.trending { background: rgba(0,100,255,0.2); color: #6495ed; }
        .badge.high-volume { background: rgba(255,0,255,0.2); color: #ff00ff; }
        .badge.high-risk { background: rgba(255,0,0,0.2); color: #ff4444; }
        
        .token-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }
        
        .metric {
            text-align: center;
        }
        
        .metric-value {
            font-family: 'SF Mono', monospace;
            font-size: 1.1rem;
        }
        
        .metric-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        .token-lifecycle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        
        .lifecycle-bar {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .lifecycle-progress {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
        }
        
        @media (max-width: 768px) {
            .token-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    
    <nav class="nav">
        <a href="index.html" class="nav-link">lurker</a>
        <a href="token.html" class="nav-link">token</a>
        <a href="origin.html" class="nav-link">origin</a>
        <a href="live.html" class="nav-link">live</a>
        <a href="lifecycle.html" class="nav-link active">lifecycle</a>
        <a href="become.html" class="nav-link">become</a>
        <a href="proof.html" class="nav-link">proof</a>
        <a href="predictions.html" class="nav-link">predictions</a>
        <a href="subscribe.html" class="nav-link">subscribe</a>
        <a href="https://x.com/LURKER_AI2026" class="nav-link" target="_blank"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-top:-2px"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
    </nav>

    <main class="main">
        <div class="container">
            <div class="lifecycle-header">
                <h1>lifecycle</h1>
                <p>tokens tracked across 72h. badges. alerts. evolution.</p>
            </div>
            
            <div class="category-tabs" id="category-tabs">
                <div class="category-tab active" data-category="all">
                    All <span class="count" id="count-all">0</span>
                </div>
                <div class="category-tab" data-category="CIO">
                    🆕 CIO (0-2h) <span class="count" id="count-cio">0</span>
                </div>
                <div class="category-tab" data-category="WATCH">
                    🔥 WATCH (2-6h) <span class="count" id="count-watch">0</span>
                </div>
                <div class="category-tab" data-category="HOTLIST">
                    ⚡ HOTLIST (6-24h) <span class="count" id="count-hotlist">0</span>
                </div>
                <div class="category-tab" data-category="ACTIVE">
                    🌊 ACTIVE (24-72h) <span class="count" id="count-active">0</span>
                </div>
            </div>
            
            <div id="tokens-container">
                <div class="loading">loading lifecycle feed...</div>
            </div>
        </div>
    </main>

    <script src="sparks.js"></script>
    <script>
        let allTokens = [];
        let currentCategory = 'all';
        
        async function loadLifecycle() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/lurker-base/lurker/main/signals/lifecycle_feed.json?t=' + Date.now());
                const data = await response.json();
                allTokens = data.candidates || [];
                renderTokens();
                updateCounts();
            } catch (e) {
                document.getElementById('tokens-container').innerHTML = 
                    '<div class="loading">loading lifecycle data...</div>';
            }
        }
        
        function updateCounts() {
            const counts = { all: allTokens.length };
            allTokens.forEach(t => {
                const cat = t.category || 'UNKNOWN';
                counts[cat] = (counts[cat] || 0) + 1;
            });
            
            document.getElementById('count-all').textContent = counts.all || 0;
            document.getElementById('count-cio').textContent = counts.CIO || 0;
            document.getElementById('count-watch').textContent = counts.WATCH || 0;
            document.getElementById('count-hotlist').textContent = counts.HOTLIST || 0;
            document.getElementById('count-active').textContent = counts.ACTIVE || 0;
        }
        
        function renderTokens() {
            const container = document.getElementById('tokens-container');
            
            let tokens = allTokens;
            if (currentCategory !== 'all') {
                tokens = allTokens.filter(t => t.category === currentCategory);
            }
            
            if (tokens.length === 0) {
                container.innerHTML = '<div class="loading">no tokens in this category</div>';
                return;
            }
            
            container.innerHTML = tokens.map(token => {
                const alertClass = token.alert === 'VOLUME_SPIKE' ? 'alert-spike' : 
                                  token.alert === 'DUMP_WARNING' ? 'alert-dump' : '';
                const age = token.timestamps?.age_hours?.toFixed(1) || '?';
                const progress = Math.min((token.timestamps?.age_hours || 0) / 72 * 100, 100);
                
                return `
                    <div class="token-card ${alertClass}">
                        <div class="token-header">
                            <span class="token-symbol">$${token.token.symbol}</span>
                            <div class="token-badges">
                                ${(token.badges || []).map(b => {
                                    const badgeClass = b.includes('NEW') ? 'new' :
                                                      b.includes('HOT') ? 'hot' :
                                                      b.includes('TRENDING') ? 'trending' :
                                                      b.includes('HIGH_VOLUME') ? 'high-volume' :
                                                      b.includes('HIGH_RISK') ? 'high-risk' : '';
                                    return `<span class="badge ${badgeClass}">${b}</span>`;
                                }).join('')}
                            </div>
                        </div>
                        
                        <div class="token-lifecycle">
                            <span>${token.category}</span>
                            <div class="lifecycle-bar">
                                <div class="lifecycle-progress" style="width: ${progress}%"></div>
                            </div>
                            <span>${age}h / 72h</span>
                        </div>
                        
                        ${token.category_change ? `
                            <div style="margin-top: 0.5rem; font-size: 0.875rem; color: var(--accent);">
                                ↻ ${token.category_change}
                            </div>
                        ` : ''}
                        
                        ${token.alert ? `
                            <div style="margin-top: 0.5rem; font-size: 0.875rem; color: ${token.alert === 'VOLUME_SPIKE' ? '#00ff00' : '#ff4444'};">
                                🚨 ${token.alert}
                            </div>
                        ` : ''}
                        
                        <div class="token-metrics">
                            <div class="metric">
                                <div class="metric-value">$${(token.metrics?.liq_usd / 1000).toFixed(1)}k</div>
                                <div class="metric-label">liquidity</div>
                            </div>
                            <div class="metric">
                                <div class="metric-value">$${(token.metrics?.vol_1h_usd / 1000).toFixed(1)}k</div>
                                <div class="metric-label">vol 1h</div>
                            </div>
                            <div class="metric">
                                <div class="metric-value">${token.metrics?.txns_5m || 0}</div>
                                <div class="metric-label">tx 5m</div>
                            </div>
                            <div class="metric">
                                <div class="metric-value">${token.risk_level || 'low'}</div>
                                <div class="metric-label">risk</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Tab switching
        document.getElementById('category-tabs').addEventListener('click', (e) => {
            const tab = e.target.closest('.category-tab');
            if (!tab) return;
            
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentCategory = tab.dataset.category;
            renderTokens();
        });
        
        // Auto-refresh every 2 minutes
        loadLifecycle();
        setInterval(loadLifecycle, 120000);
    </script>
</body>
</html>
