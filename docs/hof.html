<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hall of fame — lurker</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="alternate icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        .hof-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .hof-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .hof-header p {
            color: var(--text-muted);
        }
        
        .winners-list {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .winner-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .winner-item:hover {
            border-color: var(--accent);
        }
        
        .winner-symbol {
            font-size: 1.25rem;
            font-weight: bold;
        }
        
        .winner-gain {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ff00;
        }
        
        .winner-detail {
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    
    <nav class="nav">
        <a href="index.html" class="nav-link">lurker</a>
        <a href="token.html" class="nav-link">token</a>
        <a href="origin.html" class="nav-link">origin</a>
        <a href="live.html" class="nav-link">live</a>
        <a href="become.html" class="nav-link">become</a>
        <a href="proof.html" class="nav-link">proof</a>
        <a href="predictions.html" class="nav-link">predictions</a>
        <a href="hof.html" class="nav-link active">🏆 hof</a>
        <a href="subscribe.html" class="nav-link">subscribe</a>
        <a href="https://x.com/LURKER_AI2026" class="nav-link" target="_blank"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
    </nav>
    
    <main class="main">
        <div class="container">
            <div class="hof-header">
                <h1>🏆 hall of fame</h1>
                <p>tokens that gained +50% or more since detection</p>
            </div>
            
            <div class="winners-list" id="winners-list">
                <div class="empty-state">loading...</div>
            </div>
        </div>
    </main>
    
    <script src="sparks.js"></script>
    <script>
        const REPO_RAW = 'https://raw.githubusercontent.com/lurker-base/lurker/main';
        
        async function loadWinners() {
            try {
                const res = await fetch(`${REPO_RAW}/state/lurker_state.json?t=${Date.now()}`, { cache: 'no-store' });
                const state = await res.json();
                
                // Get tokens with >50% gain
                const winners = Object.values(state.tokens || {})
                    .filter(t => (t.performance?.current_gain || 0) > 50)
                    .sort((a, b) => (b.performance?.current_gain || 0) - (a.performance?.current_gain || 0));
                
                const container = document.getElementById('winners-list');
                
                if (winners.length === 0) {
                    container.innerHTML = '<div class="empty-state">no winners yet. patience.</div>';
                    return;
                }
                
                container.innerHTML = winners.map(w => {
                    const gain = Math.round(w.performance?.current_gain || 0);
                    const peak = Math.round(w.performance?.max_gain || 0);
                    return `
                        <div class="winner-item">
                            <div>
                                <div class="winner-symbol">$${w.symbol}</div>
                                <div class="winner-detail">peak: +${peak}%</div>
                            </div>
                            <div class="winner-gain">+${gain}%</div>
                        </div>
                    `;
                }).join('');
                
            } catch (e) {
                console.error('Error:', e);
                document.getElementById('winners-list').innerHTML = '<div class="empty-state">loading from chain...</div>';
            }
        }
        
        loadWinners();
        setInterval(loadWinners, 60000);
    </script>
</body>
</html>
