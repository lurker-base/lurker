<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hall of Fame — LURKER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.6;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
        
        h1 { 
            color: #ffd700; 
            font-size: 2.5rem; 
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }
        .subtitle { color: #666; margin-bottom: 2rem; }
        
        /* Podium top 3 */
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 1rem;
            margin-bottom: 3rem;
            padding: 2rem 0;
        }
        .podium-item {
            text-align: center;
            padding: 1.5rem;
            background: #151515;
            border: 1px solid #333;
            min-width: 120px;
        }
        .podium-item.first {
            background: linear-gradient(180deg, #ffd70033 0%, #151515 100%);
            border-color: #ffd700;
            order: 2;
            padding: 2rem 1.5rem;
        }
        .podium-item.second {
            background: linear-gradient(180deg, #c0c0c033 0%, #151515 100%);
            border-color: #c0c0c0;
            order: 1;
        }
        .podium-item.third {
            background: linear-gradient(180deg, #cd7f3233 0%, #151515 100%);
            border-color: #cd7f32;
            order: 3;
        }
        .podium-rank {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .podium-symbol {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        .podium-gain {
            font-size: 1.25rem;
            color: #22c55e;
            font-weight: bold;
        }
        
        /* Liste des gagnants */
        .winners-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .winner-row {
            display: grid;
            grid-template-columns: 50px 1fr 100px 100px;
            gap: 1rem;
            align-items: center;
            padding: 1rem 1.5rem;
            background: #151515;
            border: 1px solid #222;
        }
        .winner-row:hover {
            border-color: #444;
        }
        
        .winner-rank {
            font-size: 1.5rem;
            font-weight: bold;
            color: #666;
        }
        .winner-rank.top {
            color: #ffd700;
        }
        
        .winner-name {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .winner-date {
            color: #666;
            font-size: 0.85rem;
        }
        
        .winner-gain {
            text-align: right;
            font-size: 1.25rem;
            font-weight: bold;
            color: #22c55e;
        }
        
        .winner-proof {
            text-align: right;
        }
        .proof-link {
            color: #ff6b35;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .proof-link:hover {
            text-decoration: underline;
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Hall of Fame</h1>
        <p class="subtitle">Tokens that proved us right. +50% minimum.</p>
        
        <div class="podium" id="podium">
            <div class="loading">Loading champions...</div>
        </div>
        
        <div class="winners-list" id="winners">
        </div>
    </div>

    <script>
        async function loadHallOfFame() {
            try {
                const res = await fetch('https://raw.githubusercontent.com/lurker-base/lurker/main/data/signals/hall_of_fame.json?t=' + Date.now());
                const data = await res.json();
                
                const winners = data.certified || [];
                
                // Sort by gain
                winners.sort((a, b) => b.certified_gain - a.certified_gain);
                
                // Podium (top 3)
                const podium = document.getElementById('podium');
                if (winners.length >= 3) {
                    podium.innerHTML = `
                        <div class="podium-item second">
                            <div class="podium-rank">🥈</div>
                            <div class="podium-symbol">$${winners[1].token?.symbol || '?'}</div>
                            <div class="podium-gain">+${winners[1].certified_gain.toFixed(0)}%</div>
                        </div>
                        <div class="podium-item first">
                            <div class="podium-rank">🥇</div>
                            <div class="podium-symbol">$${winners[0].token?.symbol || '?'}</div>
                            <div class="podium-gain">+${winners[0].certified_gain.toFixed(0)}%</div>
                        </div>
                        <div class="podium-item third">
                            <div class="podium-rank">🥉</div>
                            <div class="podium-symbol">$${winners[2].token?.symbol || '?'}</div>
                            <div class="podium-gain">+${winners[2].certified_gain.toFixed(0)}%</div>
                        </div>
                    `;
                } else {
                    podium.innerHTML = '<div class="loading">Waiting for champions...</div>';
                }
                
                // List (remaining)
                const list = document.getElementById('winners');
                const remaining = winners.slice(3);
                
                if (remaining.length === 0) {
                    list.innerHTML = '<div class="loading">More winners coming soon...</div>';
                } else {
                    list.innerHTML = remaining.map((w, i) => `
                        <div class="winner-row">
                            <div class="winner-rank">#${i + 4}</div>
                            <div>
                                <div class="winner-name">$${w.token?.symbol || '?'}</div>
                                <div class="winner-date">${new Date(w.first_seen).toLocaleDateString()}</div>
                            </div>
                            <div class="winner-gain">+${w.certified_gain.toFixed(0)}%</div>
                            <div class="winner-proof">
                                <a href="https://github.com/lurker-base/lurker/blob/main/state/token_registry.json" 
                                   class="proof-link" target="_blank">Proof →</a>
                            </div>
                        </div>
                    `).join('');
                }
                
            } catch (e) {
                document.getElementById('podium').innerHTML = 
                    '<div class="loading">Loading champions...</div>';
            }
        }
        
        loadHallOfFame();
        setInterval(loadHallOfFame, 60000);
    </script>
</body>
</html>
