<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>predictions — lurker</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="alternate icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        .predictions-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .predictions-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .predictions-header p {
            color: var(--text-muted);
        }
        
        .prediction-list {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .prediction-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .prediction-item:hover {
            border-color: var(--accent);
        }
        
        .prediction-token {
            font-size: 1.25rem;
            font-weight: bold;
        }
        
        .prediction-type {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        
        .prediction-gain {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .prediction-gain.pump {
            color: #00ff00;
        }
        
        .prediction-gain.dump {
            color: #ff4444;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    
    <nav class="nav">
        <a href="index.html" class="nav-link">lurker</a>
        <a href="token.html" class="nav-link">token</a>
        <a href="origin.html" class="nav-link">origin</a>
        <a href="live.html" class="nav-link">live</a>
        <a href="become.html" class="nav-link">become</a>
        <a href="proof.html" class="nav-link">proof</a>
        <a href="predictions.html" class="nav-link active">predictions</a>
        <a href="hof.html" class="nav-link">hof</a>
        <a href="subscribe.html" class="nav-link">subscribe</a>
        <a href="https://x.com/LURKER_AI2026" class="nav-link" target="_blank"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
    </nav>
    
    <main class="main">
        <div class="container">
            <div class="predictions-header">
                <h1>predictions</h1>
                <p>pump & dump warnings with proof</p>
            </div>
            
            <div class="prediction-list" id="prediction-list">
                <div class="empty-state">loading...</div>
            </div>
        </div>
    </main>
    
    <script src="sparks.js"></script>
    <script>
        const REPO_RAW = 'https://raw.githubusercontent.com/lurker-base/lurker/main';
        
        async function loadPredictions() {
            try {
                const res = await fetch(`${REPO_RAW}/state/sent_alerts.json?t=${Date.now()}`, { cache: 'no-store' });
                const data = await res.json();
                
                const alerts = data.alerts || [];
                
                const container = document.getElementById('prediction-list');
                
                if (alerts.length === 0) {
                    container.innerHTML = '<div class="empty-state">no alerts yet</div>';
                    return;
                }
                
                // Show last 20 alerts, sorted by date
                const recent = alerts.slice(-20).reverse();
                
                container.innerHTML = recent.map(a => {
                    const gain = a.performance?.current_gain || a.performance?.max_gain || 0;
                    const isPump = a.type === 'PUMP';
                    return `
                        <div class="prediction-item">
                            <div>
                                <div class="prediction-token">$${a.symbol}</div>
                                <div class="prediction-type">${a.type.toLowerCase()} detected</div>
                            </div>
                            <div class="prediction-gain ${isPump ? 'pump' : 'dump'}">
                                ${isPump ? '+' : ''}${Math.round(gain)}%
                            </div>
                        </div>
                    `;
                }).join('');
                
            } catch (e) {
                console.error('Error:', e);
                document.getElementById('prediction-list').innerHTML = '<div class="empty-state">loading from chain...</div>';
            }
        }
        
        loadPredictions();
        setInterval(loadPredictions, 60000);
    </script>
</body>
</html>
