<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictions — LURKER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.6;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
        
        h1 { 
            color: #ff6b35; 
            font-size: 2.5rem; 
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }
        .subtitle { color: #666; margin-bottom: 2rem; }
        
        /* Stats en haut */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 3rem;
        }
        .stat-box {
            background: #151515;
            border: 1px solid #222;
            padding: 1.5rem;
            text-align: center;
        }
        .stat-number {
            font-size: 3rem;
            font-weight: bold;
            color: #ff6b35;
        }
        .stat-label {
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Liste des prédictions */
        .prediction-list { display: flex; flex-direction: column; gap: 1rem; }
        
        .prediction-card {
            background: #151515;
            border-left: 4px solid #ff6b35;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 1.5rem;
            align-items: center;
        }
        .prediction-card.dump {
            border-left-color: #ef4444;
        }
        .prediction-card.pump {
            border-left-color: #22c55e;
        }
        
        .token-icon {
            width: 50px;
            height: 50px;
            background: #222;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .token-info h3 {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }
        .token-meta {
            color: #888;
            font-size: 0.9rem;
        }
        
        .token-result {
            text-align: right;
        }
        .result-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .result-dump {
            background: #7f1d1d;
            color: #fca5a5;
        }
        .result-pump {
            background: #14532d;
            color: #86efac;
        }
        .result-accuracy {
            color: #666;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Predictions</h1>
        <p class="subtitle">What we saw vs what happened</p>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-number" id="total-warnings">-</div>
                <div class="stat-label">Warnings</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="confirmed">-</div>
                <div class="stat-label">Confirmed</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="accuracy">-</div>
                <div class="stat-label">% Accuracy</div>
            </div>
        </div>
        
        <div class="prediction-list" id="predictions">
            <div class="loading">Loading predictions...</div>
        </div>
    </div>

    <script>
        async function loadPredictions() {
            try {
                const res = await fetch('https://raw.githubusercontent.com/lurker-base/lurker/main/state/risk_warnings.json?t=' + Date.now());
                const data = await res.json();
                
                const predictions = [];
                
                // Extraire les warnings
                for (const [key, value] of Object.entries(data)) {
                    if (key.startsWith('warn_')) {
                        predictions.push({
                            symbol: value.token_symbol,
                            type: value.risk_type.includes('pump') ? 'pump' : 'dump',
                            result: value.outcome,
                            accuracy: value.status === 'confirmed' ? 100 : 0,
                            date: new Date(value.timestamp).toLocaleDateString()
                        });
                    }
                }
                
                // Stats
                const total = predictions.length;
                const confirmed = predictions.filter(p => p.accuracy === 100).length;
                const accuracy = total > 0 ? Math.round((confirmed / total) * 100) : 0;
                
                document.getElementById('total-warnings').textContent = total;
                document.getElementById('confirmed').textContent = confirmed;
                document.getElementById('accuracy').textContent = accuracy + '%';
                
                // Render
                const container = document.getElementById('predictions');
                if (predictions.length === 0) {
                    container.innerHTML = '<div class="loading">No predictions yet</div>';
                    return;
                }
                
                container.innerHTML = predictions.map(p => `
                    <div class="prediction-card ${p.type}">
                        <div class="token-icon">${p.symbol[0]}</div>
                        <div class="token-info">
                            <h3>$${p.symbol}</h3>
                            <div class="token-meta">${p.date} • ${p.type.toUpperCase()} detected</div>
                        </div>
                        <div class="token-result">
                            <span class="result-badge result-${p.result === 'rug_confirmed' || p.result === 'dump_confirmed' ? 'dump' : 'pump'}">
                                ${p.result === 'rug_confirmed' ? 'RUG' : p.result === 'dump_confirmed' ? 'DUMP' : 'PUMP'} ✓
                            </span>
                            <div class="result-accuracy">${p.accuracy}% accurate</div>
                        </div>
                    </div>
                `).join('');
                
            } catch (e) {
                document.getElementById('predictions').innerHTML = 
                    '<div class="loading">Error loading data. Retrying...</div>';
            }
        }
        
        loadPredictions();
        setInterval(loadPredictions, 60000);
    </script>
</body>
</html>
