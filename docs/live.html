<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LURKER — Live Signals</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="alternate icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Dashboard specific styles */
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }
        
        .dashboard-header {
            text-align: center;
            padding: 1rem 0 2rem;
            border-bottom: 1px solid #333;
            margin-bottom: 2rem;
        }
        
        .dashboard-header h1 {
            color: #ff6b35;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .dashboard-header .subtitle {
            color: #666;
            font-size: 0.9rem;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 0.75rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 0.75rem;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff6b35;
        }
        
        .stat-label {
            font-size: 0.65rem;
            color: #666;
            text-transform: uppercase;
        }
        
        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .filter-tab {
            background: transparent;
            border: 1px solid #333;
            color: #888;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.75rem;
            text-transform: lowercase;
        }
        
        .filter-tab:hover {
            border-color: #ff6b35;
            color: #ff6b35;
        }
        
        .filter-tab.active {
            background: #ff6b35;
            color: #000;
            border-color: #ff6b35;
        }
        
        /* Token List */
        .token-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .token-row {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 0.75rem 1rem;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr;
            gap: 1rem;
            align-items: center;
        }
        
        .token-row:hover {
            border-color: #ff6b35;
        }
        
        .token-info {
            display: flex;
            flex-direction: column;
        }
        
        .token-symbol {
            font-weight: bold;
            color: #fff;
            font-size: 1rem;
        }
        
        .token-name {
            font-size: 0.7rem;
            color: #666;
        }
        
        .token-category {
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: bold;
            text-align: center;
            border: none;
        }
        
        .cat-CIO { background: #2d5016; color: #4ade80; }
        .cat-WATCH { background: #1e3a8a; color: #60a5fa; }
        .cat-HOTLIST { background: #7c2d12; color: #fb923c; }
        .cat-CERTIFIED { background: #14532d; color: #86efac; }
        .cat-FAST { background: #581c87; color: #c084fc; }
        .cat-RUGGED { background: #000; color: #666; text-decoration: line-through; }
        
        /* Badges */
        .token-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-top: 0.3rem;
        }

        .badge {
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            font-size: 0.6rem;
            font-weight: bold;
            white-space: nowrap;
        }

        /* Simple color classes */
        .badge-green { background: #166534 !important; color: #4ade80 !important; }
        .badge-yellow { background: #854d0e !important; color: #fbbf24 !important; }
        .badge-red { background: #7f1d1d !important; color: #f87171 !important; }
        .badge-default { background: #333; color: #999; }
        
        /* Avatar styles for this page - matching main site */
        .avatar-section-fixed {
            position: fixed;
            top: 80px;
            left: 20px;
            z-index: 100;
        }
        
        .avatar-wrapper {
            position: relative;
            width: 60px;
            height: 60px;
        }
        
        .avatar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            z-index: 2;
            filter: drop-shadow(0 0 10px rgba(255, 107, 53, 0.8));
        }
        
        .avatar-glow {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.4) 0%, transparent 70%);
            animation: pulse-glow 4s ease-in-out infinite;
            z-index: 1;
        }
        
        @keyframes pulse-glow {
            0%, 100% { 
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(1);
            }
            50% { 
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.15);
            }
        }
        
        .token-metric {
            text-align: right;
        }
        
        .metric-label {
            font-size: 0.6rem;
            color: #666;
            text-transform: uppercase;
        }
        
        .metric-value {
            color: #fff;
            font-size: 0.9rem;
        }
        
        .positive { color: #4ade80; }
        .negative { color: #f87171; }
        
        /* Loading & Error */
        .loading {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
        
        .error-message {
            background: #7f1d1d;
            color: #fca5a5;
            padding: 1rem;
            margin: 1rem 0;
            text-align: center;
        }
        
        .last-update {
            text-align: center;
            color: #666;
            font-size: 0.75rem;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #333;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .token-row {
                grid-template-columns: 1.5fr 1fr 1fr;
                gap: 0.5rem;
            }
            
            .token-row > div:nth-child(4),
            .token-row > div:nth-child(5) {
                display: none;
            }
            
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    
    <!-- Navigation -->
    <nav class="nav">
        <a href="index.html" class="nav-link">lurker</a>
        <a href="token.html" class="nav-link">token</a>
        <a href="origin.html" class="nav-link">origin</a>
        <a href="live.html" class="nav-link active">live</a>
        <a href="become.html" class="nav-link">become</a>
        <a href="proof.html" class="nav-link">proof</a>
        <a href="predictions.html" class="nav-link">predictions</a>
        <a href="hof.html" class="nav-link">🏆 hof</a>
        <a href="subscribe.html" class="nav-link">subscribe</a>
        <a href="https://x.com/LURKER_AI2026" class="nav-link" target="_blank"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-top:-2px"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
    </nav>

    <!-- Avatar with Halo (Top Left) -->
    <div class="avatar-section-fixed">
        <div class="avatar-wrapper" id="avatar-wrapper">
            <img src="assets/lurker-mascot-logo.png" alt="LURKER" class="avatar" onerror="this.style.display='none'">
            <div class="avatar-glow"></div>
        </div>
    </div>

    <main class="main">
        <div class="dashboard-container">
            <div class="dashboard-header">
                <h1>👁 live signals</h1>
                <p class="subtitle">autonomous token surveillance on base</p>
            </div>
            
            <!-- Stats -->
            <div class="stats-grid" id="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="stat-total">-</div>
                    <div class="stat-label">total</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-cio">-</div>
                    <div class="stat-label">cio</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-watch">-</div>
                    <div class="stat-label">watch</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-hotlist">-</div>
                    <div class="stat-label">hotlist</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-fast">-</div>
                    <div class="stat-label">fast</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-certified">-</div>
                    <div class="stat-label">certified</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-rugged">-</div>
                    <div class="stat-label">rugged</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-pumps">-</div>
                    <div class="stat-label">pumps</div>
                </div>
            </div>
            
            <!-- Filter Tabs -->
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">all</button>
                <button class="filter-tab" data-filter="CIO">cio</button>
                <button class="filter-tab" data-filter="WATCH">watch</button>
                <button class="filter-tab" data-filter="HOTLIST">hotlist</button>
                <button class="filter-tab" data-filter="FAST">fast</button>
                <button class="filter-tab" data-filter="CERTIFIED">certified</button>
                <button class="filter-tab" data-filter="RUGGED">rugged</button>
            </div>
            
            <!-- Token List -->
            <div id="tokens-container">
                <div class="loading">observing the chain...</div>
            </div>
            
            <p class="last-update">last update: <span id="last-update">-</span></p>
        </div>
    </main>

    <script src="sparks.js"></script>
    <script>
        const STATE_URL = 'https://raw.githubusercontent.com/lurker-base/lurker/main/state/lurker_state.json';
        let allTokens = [];
        let currentFilter = 'all';
        
        async function loadState() {
            try {
                const response = await fetch(STATE_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('failed to load');
                const state = await response.json();
                
                allTokens = Object.values(state.tokens || {});
                updateStats(state.meta?.stats || {});
                renderTokens();
                document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
            } catch (error) {
                document.getElementById('tokens-container').innerHTML = 
                    `<div class="error-message">error loading data: ${error.message}</div>`;
            }
        }
        
        function updateStats(stats) {
            const byCat = stats.by_category || {};
            document.getElementById('stat-total').textContent = 
                Object.values(byCat).reduce((a, b) => a + b, 0);
            document.getElementById('stat-cio').textContent = byCat.CIO || 0;
            document.getElementById('stat-watch').textContent = byCat.WATCH || 0;
            document.getElementById('stat-hotlist').textContent = byCat.HOTLIST || 0;
            document.getElementById('stat-fast').textContent = byCat.FAST || 0;
            document.getElementById('stat-certified').textContent = byCat.CERTIFIED || 0;
            document.getElementById('stat-rugged').textContent = byCat.RUGGED || 0;
            document.getElementById('stat-pumps').textContent = stats.pumps_24h || 0;
        }
        
        function formatNumber(num) {
            if (!num) return '-';
            if (num >= 1000000) return '$' + (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return '$' + (num / 1000).toFixed(1) + 'K';
            return '$' + num.toFixed(0);
        }
        
        function formatAge(detectedAt) {
            if (!detectedAt) return '-';
            const age = (Date.now() - new Date(detectedAt)) / 1000 / 60;
            if (age < 60) return Math.floor(age) + 'm';
            return Math.floor(age / 60) + 'h';
        }
        
        function renderTokens() {
            const container = document.getElementById('tokens-container');
            
            let tokens = allTokens;
            if (currentFilter !== 'all') {
                tokens = tokens.filter(t => t.category === currentFilter);
            }
            
            // Sort by detected_at desc
            tokens.sort((a, b) => new Date(b.detected_at) - new Date(a.detected_at));
            
            if (tokens.length === 0) {
                container.innerHTML = '<div class="loading">no tokens in this category</div>';
                return;
            }
            
            container.innerHTML = tokens.map(token => {
                const perf = token.performance || {};
                const metrics = token.metrics || {};
                const gain = perf.current_gain || 0;
                const gainClass = gain > 0 ? 'positive' : gain < 0 ? 'negative' : '';
                
                // Generate risk badges with colors
                const riskBadges = token.risk_tags || [];
                const riskBadgeHTML = riskBadges.map(b => {
                    let badgeClass = 'badge-default';
                    
                    // Determine class based on badge content
                    if (b.includes('📉') || b.includes('💀') || b.includes('RUG')) {
                        badgeClass = 'badge-red';
                    } else if (b.includes('⚠️') || b.includes('WATCH') || b.includes('FRESH')) {
                        badgeClass = 'badge-yellow';
                    } else if (b.includes('⚡') || b.includes('📈') || b.includes('💧') || b.includes('💎') || b.includes('🌊')) {
                        badgeClass = 'badge-green';
                    }
                    
                    return `<span class="badge ${badgeClass}">${b}</span>`;
                }).join('');
                
                // Generate DexScreener badges (good, premium, boost, etc.)
                const dsBadges = token.badges || [];
                const dsBadgeHTML = dsBadges.map(b => {
                    let badgeClass = 'badge-default';
                    const badgeLower = b.toLowerCase();
                    
                    if (badgeLower.includes('good') || badgeLower.includes('verified')) {
                        badgeClass = 'badge-green';
                    } else if (badgeLower.includes('premium') || badgeLower.includes('boost')) {
                        badgeClass = 'badge-yellow';
                    } else if (badgeLower.includes('trending') || badgeLower.includes('hot')) {
                        badgeClass = 'badge-green';
                    } else if (badgeLower.includes('warning') || badgeLower.includes('risk')) {
                        badgeClass = 'badge-red';
                    }
                    
                    return `<span class="badge ${badgeClass}">${b}</span>`;
                }).join('');
                
                const allBadgesHTML = riskBadgeHTML + dsBadgeHTML;
                
                // Generate social links
                const addr = token.address || '';
                const dexscreenerLink = addr ? `https://dexscreener.com/base/${addr}` : '#';
                const twitterLink = token.twitter || '';
                const websiteLink = token.website || '';
                
                const socialHTML = `
                    <div class="token-socials" style="margin-top: 0.3rem; display: flex; gap: 0.5rem;">
                        <a href="${dexscreenerLink}" target="_blank" style="color: #ff6b35; font-size: 0.7rem; text-decoration: none;">dex</a>
                        ${twitterLink ? `<a href="${twitterLink}" target="_blank" style="color: #60a5fa; font-size: 0.7rem; text-decoration: none;">x</a>` : ''}
                        ${websiteLink ? `<a href="${websiteLink}" target="_blank" style="color: #4ade80; font-size: 0.7rem; text-decoration: none;">web</a>` : ''}
                    </div>
                `;
                
                return `
                    <div class="token-row">
                        <div class="token-info">
                            <span class="token-symbol">$${token.symbol || '?'}</span>
                            <span class="token-name">${token.name || 'unknown'}</span>
                            <div class="token-badges">${allBadgesHTML}</div>
                            ${socialHTML}
                        </div>
                        <button class="token-category cat-${token.category || 'CIO'}">${token.category || 'CIO'}</button>
                        <div class="token-metric">
                            <div class="metric-label">price</div>
                            <div class="metric-value">${metrics.price_usd && !isNaN(metrics.price_usd) ? '$' + Number(metrics.price_usd).toFixed(6) : '-'}</div>
                        </div>
                        <div class="token-metric">
                            <div class="metric-label">gain</div>
                            <div class="metric-value ${gainClass}">${gain && !isNaN(gain) ? (gain > 0 ? '+' : '') + Number(gain).toFixed(1) + '%' : '-'}</div>
                        </div>
                        <div class="token-metric">
                            <div class="metric-label">liquidity</div>
                            <div class="metric-value">${metrics.liq_usd && !isNaN(metrics.liq_usd) ? formatNumber(metrics.liq_usd) : '-'}</div>
                        </div>
                        <div class="token-metric">
                            <div class="metric-label">age</div>
                            <div class="metric-value">${formatAge(token.detected_at)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Filter tabs
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                renderTokens();
            });
        });
        
        // Load and refresh
        loadState();
        setInterval(loadState, 30000); // Refresh every 30s
    </script>
</body>
</html>
