<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>live signals — lurker</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--bg-elevated); border: 1px solid var(--border); padding: 1rem; text-align: center; border-radius: 8px; }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; margin-top: 0.5rem; }
        
        .filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .filter-tab { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 0.5rem 1rem; cursor: pointer; font-family: inherit; font-size: 0.8rem; border-radius: 4px; }
        .filter-tab:hover { border-color: var(--accent); color: var(--accent); }
        .filter-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        
        .token-list { display: flex; flex-direction: column; gap: 0.75rem; }
        
        .token-row {
            background: var(--bg-elevated); border: 1px solid var(--border); padding: 1rem 1.5rem;
            display: grid; grid-template-columns: 2fr 2fr 1.5fr 1fr 0.5fr; gap: 1.5rem; align-items: center;
            border-radius: 8px; transition: border-color 0.2s;
        }
        .token-row:hover { border-color: var(--accent); }
        
        .token-info { display: flex; flex-direction: column; gap: 0.25rem; }
        .token-symbol { font-weight: bold; font-size: 1.1rem; color: #f97316; text-decoration: none; }
        
        /* DEXSCREENER LINK - Make it visible and clickable */
        .dex-link {
            color: #f97316 !important;
            text-decoration: none !important;
            border-bottom: 1px dashed #f97316;
            padding-bottom: 1px;
            cursor: pointer;
        }
        .dex-link:hover { color: var(--accent) !important; border-bottom-style: solid; }
        
        .token-address { font-size: 0.7rem; color: var(--text-dim); font-family: monospace; }
        
        .token-metrics { display: flex; gap: 1.5rem; }
        .token-metric { text-align: right; }
        .metric-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; }
        .metric-value { font-weight: bold; }
        
        /* BADGES - LURKER native indicators */
        .token-badges { display: flex; gap: 0.3rem; flex-wrap: wrap; }
        .badge { padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.65rem; font-weight: bold; }
        
        .badge-score { background: #1e3a8a; color: #ffffff; }
        .badge-fresh { background: #dc2626; color: #fff; }
        .badge-liquid { background: #0891b2; color: #fff; }
        .badge-volume { background: #7c3aed; color: #fff; }
        .badge-tx { background: #059669; color: #fff; }
        
        /* Risk badges */
        .badge-risk-low { background: #166534; color: #4ade80; }
        .badge-risk-med { background: #854d0e; color: #fbbf24; }
        .badge-risk-high { background: #7f1d1d; color: #f87171; }
        .badge-rug { background: #000; color: #ff0000; border: 1px solid #ff0000; }
        
        /* LURKER custom badges */
        .badge-convergence { background: #be185d; color: #fbcfe8; }
        .badge-smart { background: #1d4ed8; color: #bfdbfe; }
        .badge-narrative { background: #7c3aed; color: #ede9fe; }
        
        /* Premium/Pump/Dump badges */
        .badge-premium { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; }
        .badge-gem { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: #fff; }
        .badge-pump { background: #065f46; color: #34d399; }
        .badge-mega-pump { background: #047857; color: #10b981; animation: pulse 1s infinite; }
        .badge-dump { background: #7f1d1d; color: #fca5a5; }
        .badge-rug { background: #000; color: #ff0000; border: 1px solid #ff0000; }
        .badge-whale { background: #0d9488; color: #5eead4; }
        .badge-hot { background: #dc2626; color: #fecaca; }
        .badge-viral { background: #f59e0b; color: #78350f; }
        
        /* NEW - Simplified badges */
        .badge-historical { background: #374151; color: #9ca3af; }
        .badge-active { background: #059669; color: #6ee7b7; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .loading { text-align: center; padding: 4rem; color: var(--text-dim); }
        .last-update { text-align: center; color: var(--text-dim); font-size: 0.75rem; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .token-row { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
            .token-metrics { display: none; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    
    <nav class="nav">

        <a href="hof.html" class="nav-link">🏆 hof</a>
        <a href="subscribe.html" class="nav-link">subscribe</a>

    <main class="main">
        <div class="container page-container with-sidebar">
            <div class="page-sidebar">
                <div class="avatar-wrapper" id="avatar-wrapper">
                    <img src="assets/lurker-mascot-logo.png" alt="" class="avatar">
                    <div class="avatar-glow"></div>
                    <div class="sparks-container" id="sparks"></div>
                </div>
            </div>
            
            <div class="page-content">
                <h1 class="page-title">live signals</h1>
                
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value" id="stat-total">-</div><div class="stat-label">Total</div></div>
                    <div class="stat-card"><div class="stat-value" id="stat-new">-</div><div class="stat-label">New</div></div>
                    <div class="stat-card"><div class="stat-value" id="stat-active">-</div><div class="stat-label">Active</div></div>
                    <div class="stat-card"><div class="stat-value" id="stat-risk">-</div><div class="stat-label">Risk</div></div>
                </div>
                
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all">all</button>
                    <button class="filter-tab" data-filter="new">new</button>
                    <button class="filter-tab" data-filter="active">active</button>
                </div>
                
                <div id="tokens-container"><div class="loading">observing the chain...</div></div>
                
                <p class="last-update">last scan: <span id="last-update">-</span> | next: <span id="countdown">30</span>s</p>
            </div>
        </div>
    </main>

    <script src="sparks.js"></script>
    <script>
        const CIO_FEED_URL = '../data/cio_feed.json';
        const DEXSCREENER_API = 'https://api.dexscreener.com/latest/dex/tokens';
        
        let allTokens = [];
        let tokenDexData = {}; // Cache DexScreener data
        let currentFilter = 'all';
        
        // Validate token with DexScreener in real-time
        async function validateTokenDexscreener(address) {
            if (tokenDexData[address]) return tokenDexData[address];
            
            try {
                const resp = await fetch(DEXSCREENER_API + '/' + address);
                if (!resp.ok) return null;
                const data = await resp.json();
                const pairs = data.pairs || [];
                
                if (pairs.length === 0) {
                    tokenDexData[address] = { rugged: true, reason: 'no_pairs' };
                    return tokenDexData[address];
                }
                
                // Get best pair by liquidity
                const best = pairs.reduce((a, b) => 
                    (a.liquidity?.usd || 0) > (b.liquidity?.usd || 0) ? a : b);
                
                const liquidity = best.liquidity?.usd || 0;
                const priceChange = best.priceChange?.h24 || 0;
                
                const result = {
                    rugged: liquidity < 100 || priceChange < -90,
                    liquidity: liquidity,
                    priceChange: priceChange,
                    dex: best.dexId,
                    pairAddress: best.pairAddress
                };
                
                if (result.rugged) {
                    result.reason = liquidity < 100 ? 'low_liq' : 'dump';
                }
                
                tokenDexData[address] = result;
                return result;
                
            } catch (e) {
                console.warn('DexScreener validation failed:', e);
                return null;
            }
        }
        
        async function loadData() {
            try {
                const response = await fetch(CIO_FEED_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('failed to load');
                const data = await response.json();
                
                // Support all feed formats
                allTokens = data.signals || data.candidates || [];
                
                // Convert V2 format (signals/latest.json) to display format
                if (data.meta?.format === 'LURKER_SIGNAL_V2' && data.signals) {
                    allTokens = data.signals.map(s => ({
                        token: s.token,
                        score: (s.confidence || 0) * 16.67,
                        risk: { level: s.scores?.risk || 'medium' },
                        metrics: s.metrics,
                        age_hours: s.age?.hours || 0,
                        source: s.source,
                        dex_url: s.dex_url,
                        thesis: s.thesis,
                        why_now: s.why_now,
                        invalidation: s.invalidation,
                        confidence: s.confidence
                    }));
                }
                
                // Convert CIO Ultra format (signals/cio_feed.json) to display format
                if (data.schema === 'lurker_cio_ultra_launch' && data.candidates) {
                    allTokens = data.candidates.map(c => ({
                        token: c.token,
                        score: c.scores?.cio_score || 0,
                        risk: { level: c.risk_level || 'medium' },
                        metrics: {
                            liq_usd: c.metrics?.liq_usd || 0,
                            vol_1h_usd: c.metrics?.vol_1h_usd || 0,
                            vol_24h_usd: (c.metrics?.vol_1h_usd || 0) * 24,
                            vol_5m_usd: c.metrics?.vol_5m_usd || 0,
                            txns_5m: c.metrics?.txns_5m || 0,
                            txns_24h: (c.metrics?.txns_5m || 0) * 288,
                        },
                        age_hours: c.timestamps?.age_hours || (c.timestamps?.age_minutes || 0) / 60,
                        source: c.source,
                        quality: c.quality,
                        badges: [],
                        action_badge: c.action_badge,
                        action_reason: c.action_reason,
                    }));
                }
                
                // Validate all tokens with DexScreener in parallel
                const validatePromises = allTokens.map(async (token) => {
                    const addr = token.token.address;
                    const dexData = await validateTokenDexscreener(addr);
                    token._dexData = dexData;
                });
                
                await Promise.all(validatePromises);
                
                // Filter out rugged tokens
                const beforeCount = allTokens.length;
                allTokens = allTokens.filter(t => !t._dexData?.rugged);
                console.log(`Filtered ${beforeCount - allTokens.length} rugged tokens`);
                
                updateStats();
                renderTokens();
                // Show feed timestamp + local time
                const feedTime = data.meta?.updated_at ? new Date(data.meta.updated_at).toLocaleString() : 'unknown';
                const feedStatus = data.meta?.status || '';
                document.getElementById('last-update').textContent = feedTime + (feedStatus ? ' (' + feedStatus + ')' : '');
            } catch (error) {
                document.getElementById('tokens-container').innerHTML = '<div class="loading">error: ' + error.message + '</div>';
            }
        }
        
        function updateStats() {
            document.getElementById('stat-total').textContent = allTokens.length;
            document.getElementById('stat-new').textContent = allTokens.filter(t => t.score >= 95).length;
            document.getElementById('stat-active').textContent = allTokens.filter(t => t.score >= 90).length;
            document.getElementById('stat-risk').textContent = allTokens.filter(t => t.risk?.level === 'high').length;
        }
        
        function formatNumber(num) {
            if (!num) return '-';
            if (num >= 1000000) return '$' + (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return '$' + (num / 1000).toFixed(1) + 'K';
            return '$' + num.toFixed(0);
        }
        
        function formatAge(ageHours) {
            if (!ageHours) return '-';
            if (ageHours < 1) return Math.floor(ageHours * 60) + 'm';
            return ageHours.toFixed(1) + 'h';
        }
        
        function renderTokens() {
            const container = document.getElementById('tokens-container');
            let tokens = allTokens;
            if (currentFilter === 'new') tokens = tokens.filter(t => t.score >= 95);
            if (currentFilter === 'active') tokens = tokens.filter(t => t.score >= 90 && t.score < 95);
            
            tokens.sort((a, b) => b.score - a.score);
            
            if (tokens.length === 0) {
                container.innerHTML = '<div class="loading">no signals detected</div>';
                return;
            }
            
            container.innerHTML = '<div class="token-list">' + tokens.map(token => {
                const risk = token.risk?.level || token.risk_level || 'medium';
                const riskClass = risk === 'high' ? 'badge-risk-high' : risk === 'medium' ? 'badge-risk-med' : 'badge-risk-low';
                
                // Get explanation if available
                const explanation = token.explanation || {};
                const isRecycled = token.is_recycled || false;
                const signalQuality = explanation.signal_quality || 'medium';
                
                // Generate badges - HONEST VERSION: max 3, prioritize risk
                const badges = [];
                
                // 0. ACTION BADGE (most important - tells user what to do)
                const actionBadge = token.action_badge || data.meta?.badge_legend?.['🟡 SURVEILLER'];
                if (actionBadge) {
                    const actionClass = actionBadge.includes('🟢') ? 'badge-pump' : 
                                       actionBadge.includes('🔴') ? 'badge-rug' : 'badge-premium';
                    badges.push('<span class="badge ' + actionClass + '">' + actionBadge + '</span>');
                }
                
                // 1. RISK BADGE (always first - most important)
                badges.push('<span class="badge ' + riskClass + '">' + risk.toUpperCase() + ' RISK</span>');
                
                // 2. QUALITY/SCORE BADGE (context for the score)
                let scoreClass = 'badge-score';
                if (token.score >= 80) scoreClass += ' badge-premium';
                badges.push('<span class="badge ' + scoreClass + '">' + token.score.toFixed(0) + '/100</span>');
                
                // 3. THIRD BADGE: Most relevant metric based on token characteristics
                // Prioritize warnings and notable metrics
                const liq = token.metrics?.liq_usd || 0;
                const vol_1h = token.metrics?.vol_1h_usd || 0;
                const vol_24h = token.metrics?.vol_24h_usd || vol_1h * 24; // Approximate
                const tx_5m = token.metrics?.txns_5m || 0;
                
                // Check for risks that should be highlighted
                const risks = token.risks || [];
                
                if (isRecycled) {
                    badges.push('<span class="badge badge-historical">🔄 RECYCLED</span>');
                } else if (token.age_hours < 0.5 && risk === 'high') {
                    // Very new + high risk = potential rug
                    badges.push('<span class="badge badge-rug">⚠️ BRAND NEW</span>');
                } else if (risks.includes('very_low_liquidity') || liq < 2000) {
                    badges.push('<span class="badge badge-dump">💀 LOW LIQ</span>');
                } else if (risks.includes('dumping')) {
                    badges.push('<span class="badge badge-dump">📉 DUMPING</span>');
                } else if (liq >= 50000) {
                    badges.push('<span class="badge badge-liquid">💧 $50K+ LIQ</span>');
                } else if (vol_24h >= 100000) {
                    badges.push('<span class="badge badge-volume">📈 HIGH VOL</span>');
                } else if (tx_5m >= 50) {
                    badges.push('<span class="badge badge-tx">⚡ ACTIVE</span>');
                } else if (token.age_hours < 1) {
                    badges.push('<span class="badge badge-fresh">🔥 <1H OLD</span>');
                } else {
                    // Default: age badge
                    badges.push('<span class="badge badge-historical">' + formatAge(token.age_hours) + '</span>');
                }
                
                // Add explanation tooltip or summary if available
                let explanationHtml = '';
                if (explanation.summary) {
                    const caveats = explanation.risk_caveats || [];
                    const caveatText = caveats.length > 0 ? '<br>⚠️ ' + caveats.join('<br>⚠️ ') : '';
                    explanationHtml = `
                        <div class="token-explanation" style="font-size: 0.75rem; color: #9ca3af; margin-top: 4px; grid-column: 1 / -1; border-top: 1px solid #333; padding-top: 4px;">
                            <span style="color: #f97316;">📊 ${explanation.summary}</span>
                            ${caveatText}
                        </div>
                    `;
                }
                
                // DexScreener link - PROMINENT
                const dexUrl = 'https://dexscreener.com/base/' + token.token.address;
                
                // Format metrics for display
                const volDisplay = vol_1h > 0 ? formatNumber(vol_1h) + '/h' : formatNumber(vol_24h) + '/24h';
                
                return `
                    <div class="token-row" style="grid-template-rows: auto auto;">
                        <div class="token-info">
                            <span class="token-symbol">
                                <a href="${dexUrl}" target="_blank" class="dex-link">$<span style="color:#fff;font-weight:bold">${token.token.symbol?.replace("$","") || '???'}</span></a>
                            </span>
                            <span class="token-address">${token.token.address.slice(0, 6)}...${token.token.address.slice(-4)}</span>
                        </div>
                        <div class="token-metrics">
                            <div class="token-metric">
                                <div class="metric-label">Liquidity</div>
                                <div class="metric-value">${formatNumber(liq)}</div>
                            </div>
                            <div class="token-metric">
                                <div class="metric-label">Volume</div>
                                <div class="metric-value">${volDisplay}</div>
                            </div>
                        </div>
                        <div class="token-badges">${badges.join('')}</div>
                        <div class="token-metric">
                            <div class="metric-label">Age</div>
                            <div class="metric-value">${formatAge(token.age_hours)}</div>
                        </div>
                        <div class="token-metric">
                            <div class="metric-label">Source</div>
                            <div class="metric-value" style="font-size: 0.7rem; text-transform: uppercase;">${token.source || 'scan'}</div>
                        </div>
                        ${explanationHtml}
                    </div>
                `;
            }).join('') + '</div>';
        }
        
        // Filter tabs
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                renderTokens();
            });
        });
        
        loadData();
        setInterval(loadData, 30000);
        
        let countdown = 30;
        setInterval(() => {
            countdown--;
            if (countdown <= 0) countdown = 30;
            document.getElementById('countdown').textContent = countdown;
        }, 1000);
    </script>
